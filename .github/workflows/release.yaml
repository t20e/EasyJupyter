# GitHub Actions workflow for publishing to PyPI
name: release

on:
    push: # Runs every time a new commit is pushed to the main branch
        tags: # Make sure the tagging convention is the same for all releases!
            - "[0-9]+.[0-9]+.[0-9]+"
            - "[0-9]+.[0-9]+.[0-9]+a[0-9]+"
            - "[0-9]+.[0-9]+.[0-9]+b[0-9]+"
            - "[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

env:
    PACKAGE_NAME: "EasyJupyter"
    OWNER: "t20e"

jobs: # Each job runs on a VM
    # Extracts the version and suffix from the tag
    details:
        runs-on: ubuntu-latest
        outputs:
            new_version: ${{ steps.release.outputs.new_version }}
            suffix: ${{ steps.release.outputs.suffix }}
            tag_name: ${{ steps.release.outputs.tag_name }}
        steps:
            - uses: actions/checkout@v4

            - name: Extract tag and Details
              id: release
              run: |
                  if [ "${{ github.ref_type }}" = "tag" ]; then
                    TAG_NAME=${GITHUB_REF#refs/tags/}
                    NEW_VERSION=$(echo $TAG_NAME | awk -F'-' '{print $1}')
                    SUFFIX=$(echo $TAG_NAME | grep -oP '[a-z]+[0-9]+' || echo "")
                    echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
                    echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"
                    echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
                    echo "Version is $NEW_VERSION"
                    echo "Suffix is $SUFFIX"
                    echo "Tag name is $TAG_NAME"
                  else
                    echo "No tag found"
                    exit 1
                  fi

    # Checks if the version is greater than the latest version on PyPI
    check_pypi:
        needs: details
        runs-on: ubuntu-latest
        steps:
            - name: Fetch information from PyPI
              run: |
                  response=$(curl -s https://pypi.org/pypi/${{ env.PACKAGE_NAME }}/json || echo "{}")
                  latest_previous_version=$(echo $response | jq --raw-output "select(.releases != null) | .releases | keys_unsorted | last")
                  if [ -z "$latest_previous_version" ]; then
                    echo "Package not found on PyPI."
                    latest_previous_version="0.0.0"
                  fi
                  echo "Latest version on PyPI: $latest_previous_version"
                  echo "latest_previous_version=$latest_previous_version" >> $GITHUB_ENV

            - name: Compare versions and exit if not newer
              run: |
                  NEW_VERSION=${{ needs.details.outputs.new_version }}
                  LATEST_VERSION=$latest_previous_version
                  if [ "$(printf '%s\n' "$LATEST_VERSION" "$NEW_VERSION" | sort -rV | head -n 1)" != "$NEW_VERSION" ] || [ "$NEW_VERSION" == "$LATEST_VERSION" ]; then
                    echo "The new version $NEW_VERSION is not greater than the latest version $LATEST_VERSION on PyPI."
                    exit 1
                  else
                    echo "The new version $NEW_VERSION is greater than the latest version $LATEST_VERSION on PyPI."
                  fi

    # Builds the source and wheel distribution
    setup_and_build:
        needs: [details, check_pypi]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install Poetry
              run: |
                  curl -sSL https://install.python-poetry.org | python3 -
                  echo "$HOME/.local/bin" >> $GITHUB_PATH

            - name: Install dependencies
              run: poetry sync --no-interaction

            - name: Set project version with Poetry
              run: |
                  poetry version ${{ needs.details.outputs.new_version }}

            - name: Build source and wheel distribution
              run: |
                  poetry build

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/

    # Publishes the distribution to PyPI
    pypi_publish:
        name: Upload release to PyPI
        needs: [setup_and_build, details]
        runs-on: ubuntu-latest
        environment:
            name: pypi
            # TODO make sure this works when deploying
            url: https://pypi.org/project/EasyJupyter/ 
        permissions:
            id-token: write
        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/

            - name: Publish distribution to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1

    # Creates a GitHub release
    github_release:
        name: Create GitHub Release
        needs: [setup_and_build, details]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/

            - name: Create GitHub Release
              id: create_release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release create ${{ needs.details.outputs.tag_name }} dist/* --title ${{ needs.details.outputs.tag_name }} --generate-notes
